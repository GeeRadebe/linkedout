// ── API ──────────────────────────────────────────────────────────────────────
async function callClaude(system,message,onResult){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[{role:"user",content:message}]})});
    const data=await res.json();
    onResult((data.content||[]).map(b=>b.text||"").join("")||"No response received.");
  }catch{onResult("⚠ Connection error. Check your network.");}
}
async function fetchJobs(){
  try{
    const categories=["software-dev","customer-service","sales","marketing","business","finance","human-resources","project-management","writing","data"];
    const cat=categories[Math.floor(Date.now()/3600000)%categories.length];
    const res=await fetch(`https://remotive.com/api/remote-jobs?limit=30&category=${cat}`);
    const data=await res.json();
    return(data.jobs||[]).slice(0,20).map(j=>({id:j.id,title:j.title,company:j.company_name,
      location:j.candidate_required_location||"Remote",type:j.job_type||"Full-time",
      tags:(j.tags||[]).slice(0,3),url:j.url,posted:new Date(j.publication_date).toLocaleDateString("en-ZA"),salary:j.salary||null}));
  }catch{return FALLBACK_JOBS;}
}
async function fetchNews(){
  try{
    const res=await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/business/rss.xml&count=12");
    const data=await res.json();
    return(data.items||[]).map(n=>({title:n.title,desc:(n.description||"").replace(/<[^>]+>/g,"").slice(0,160)+"…",
      url:n.link,date:new Date(n.pubDate).toLocaleDateString("en-ZA"),source:"BBC Business"}));
  }catch{return FALLBACK_NEWS;}
}

const ThemeToggle=({current,onChange})=>{
  const [open,setOpen]=useState(false);
  return(

            <button key={t.id} onClick={()=>{onChange(t.id);setOpen(false);}}
              style={{display:"flex",alignItems:"center",gap:10,padding:"9px 16px",
                background:current===t.id?"var(--red)":"transparent",
                border:`1px solid ${current===t.id?"var(--red)":"var(--border)"}`,
                color:current===t.id?"#fff":"var(--muted)",
                fontFamily:"var(--body)",fontSize:11,letterSpacing:"0.1em",
                cursor:"pointer",textAlign:"left",transition:"all 0.15s",whiteSpace:"nowrap"}}>
              <span style={{fontSize:15}}>{t.icon}</span>
              <span style={{textTransform:"uppercase"}}>{t.label}</span>
              {t.note&&<span style={{fontSize:8,opacity:.55,marginLeft:4,fontFamily:"var(--mono)"}}>({t.note})</span>}
              {current===t.id&&<span style={{marginLeft:"auto",fontSize:11}}>✓</span>}
            </button>
          ))}
        </div>
      )}
      <button onClick={()=>setOpen(o=>!o)} aria-label="Change display theme" title="Change theme"
        style={{width:46,height:46,borderRadius:"50%",background:"var(--red)",border:"2px solid var(--border)",
          color:"#fff",fontSize:20,cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.4)",

        onMouseEnter={e=>e.currentTarget.style.transform="scale(1.12)"}
        onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
        {THEMES[current].icon}
      </button>
    </div>
  );
};

// ── JOBS ─────────────────────────────────────────────────────────────────────
const Jobs=({jobs,loading})=>{
  const [q,setQ]=useState("");
  const [saved,setSaved]=useState([]);
  const filtered=jobs.filter(j=>!q||j.title.toLowerCase().includes(q.toLowerCase())||j.company.toLowerCase().includes(q.toLowerCase())||j.tags.some(t=>t.toLowerCase().includes(q.toLowerCase())));
  return(
    <div style={{animation:"slideIn 0.3s ease"}}>
      <Head label="Live Job Feed" live/>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Filter by title, company, skill…"
          style={{flex:1,background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",
            fontSize:11,padding:"9px 12px",outline:"none",fontFamily:"var(--body)"}}/>
        {loading&&<Spin/>}
      </div>
      <div style={{display:"grid",gap:2}}>
        {filtered.map(j=>(
          <div key={j.id} style={{background:"var(--surface)",border:"1px solid var(--border)",padding:"14px 16px",display:"grid",gridTemplateColumns:"1fr auto",gap:10,transition:"border-color 0.2s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="var(--red)"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
            <div>
              <div style={{fontFamily:"var(--display)",fontSize:18,marginBottom:3,color:"var(--text)"}}>{j.title}</div>
              <div style={{fontSize:10,color:"var(--muted)",marginBottom:8,fontFamily:"var(--mono)"}}>{j.company} · {j.location} · {j.posted}</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {j.tags.map(t=><Tag key={t}>{t}</Tag>)}
                {j.salary&&<Tag c="var(--amber)">{j.salary}</Tag>}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <a href={j.url} target="_blank" rel="noreferrer"
                style={{fontSize:9,letterSpacing:"0.12em",padding:"6px 12px",background:"var(--red)",
                  color:"#fff",textDecoration:"none",textTransform:"uppercase",textAlign:"center",fontFamily:"var(--mono)"}}>Apply →</a>

        <a key={i} href={n.url} target="_blank" rel="noreferrer"
          style={{display:"block",background:"var(--surface)",border:"1px solid var(--border)",padding:18,textDecoration:"none",color:"var(--text)",transition:"border-color 0.2s"}}
          onMouseEnter={e=>e.currentTarget.style.borderColor="var(--red)"}
          onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
          <div style={{fontSize:9,color:"var(--red)",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:8,fontFamily:"var(--mono)"}}>{n.source} · {n.date}</div>
          <div style={{fontFamily:"var(--serif)",fontSize:14,lineHeight:"var(--lh)",marginBottom:8,color:"var(--text)"}}>{n.title}</div>
          <div style={{fontSize:10,color:"var(--muted)",lineHeight:"var(--lh)",fontFamily:"var(--body)"}}>{n.desc}</div>
          <div style={{fontSize:9,color:"var(--red)",marginTop:10,letterSpacing:"0.15em",fontFamily:"var(--mono)"}}>READ →</div>
        </a>
      ))}
    </div>
  </div>
);

// ── BOT ──────────────────────────────────────────────────────────────────────
const BotPanel=({botKey})=>{
  const cfg=BOT_CONFIG[botKey];
  const [input,setInput]=useState("");
  const [msgs,setMsgs]=useState([]);
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  const send=async()=>{
    if(!input.trim()||loading)return;
    const text=input.trim(); setInput("");
    setMsgs(m=>[...m,{role:"user",text}]);
    setLoading(true);
    setMsgs(m=>[...m,{role:"bot",text:""}]);
    await callClaude(cfg.system,text,result=>{
      setMsgs(m=>{const u=[...m];u[u.length-1]={role:"bot",text:result};return u;});
    });
    setLoading(false);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",background:"var(--surface)",border:`1px solid ${cfg.color}44`,minHeight:400}}>
      <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8,background:"var(--surface2)"}}>
        <span style={{color:cfg.color,fontSize:14}}>{cfg.icon}</span>
        <span style={{fontFamily:"var(--display)",fontSize:17,textTransform:"uppercase",letterSpacing:"0.05em",color:"var(--text)"}}>{cfg.label}</span>
        <Dot c={cfg.color}/>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:10,maxHeight:320,minHeight:200}}>
        {!msgs.length&&<div style={{fontSize:10,color:"var(--muted)",textAlign:"center",marginTop:24,lineHeight:"var(--lh)",fontFamily:"var(--body)"}}>{cfg.icon} {cfg.label} ready.<br/><span style={{fontSize:9,fontFamily:"var(--mono)"}}>Ask anything about your career.</span></div>}
        {msgs.map((m,i)=>(
          <div key={i} style={{alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"87%",
            background:m.role==="user"?cfg.color:"var(--surface2)",
            color:m.role==="user"?(botKey==="market"?"#fff":"var(--bg)"):"var(--text)",
            padding:"9px 13px",fontSize:11,lineHeight:"var(--lh)",letterSpacing:"var(--ls)",
            whiteSpace:"pre-wrap",animation:"slideIn 0.2s ease",fontFamily:"var(--body)"}}>
            {m.text||(loading&&i===msgs.length-1?<span style={{animation:"blink 1s infinite"}}>█</span>:"")}
          </div>
        ))}
        <div ref={bottomRef}/>
      </div>
      <div style={{borderTop:"1px solid var(--border)",display:"flex"}}>
        <textarea rows={2} value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder={cfg.placeholder}
          style={{flex:1,background:"var(--surface2)",border:"none",color:"var(--text)",
            fontSize:11,padding:"10px 12px",resize:"none",outline:"none",fontFamily:"var(--body)",lineHeight:"var(--lh)"}}/>
        <button onClick={send} disabled={loading||!input.trim()}
          style={{padding:"0 16px",background:loading?"var(--surface2)":cfg.color,border:"none",
            color:botKey==="market"?"#fff":"var(--bg)",fontSize:11,letterSpacing:"0.12em",
            cursor:loading?"not-allowed":"pointer",textTransform:"uppercase",minWidth:56,fontFamily:"var(--mono)"}}>
          {loading?"…":"→"}
        </button>
      </div>
    </div>
  );
};

const Bots=()=>{
  const [active,setActive]=useState("resume");
  return(
    <div style={{animation:"slideIn 0.3s ease"}}>
      <Head label="AI Bots"/>
      <div style={{display:"flex",gap:2,marginBottom:14}}>
        {Object.entries(BOT_CONFIG).map(([k,cfg])=>(
          <button key={k} onClick={()=>setActive(k)}
            style={{flex:1,padding:"9px 4px",fontFamily:"var(--body)",fontSize:9,letterSpacing:"0.1em",
              textTransform:"uppercase",cursor:"pointer",
              background:active===k?cfg.color:"var(--surface)",
              color:active===k?(k==="market"?"#fff":"var(--bg)"):"var(--muted)",
              border:`1px solid ${active===k?cfg.color:"var(--border)"}`,transition:"all 0.2s"}}>
            {cfg.icon} {cfg.label}
          </button>
        ))}
      </div>
      <BotPanel key={active} botKey={active}/>
      <div style={{marginTop:8,fontSize:9,color:"var(--muted)",letterSpacing:"0.1em",fontFamily:"var(--mono)"}}>POWERED BY CLAUDE · SHIFT+ENTER FOR NEW LINE</div>
    </div>
  );
};

// ── TRACKER ──────────────────────────────────────────────────────────────────
const Tracker=()=>{
  const [apps,setApps]=useState([
    {id:1,company:"Accenture ZA",role:"Power Platform Developer",status:"Interview",date:"2026-03-20",notes:"Round 2 scheduled"},
    {id:2,company:"Discovery",role:"Data Analyst",status:"Applied",date:"2026-03-25",notes:""},
    {id:3,company:"Rain",role:"Junior DevOps",status:"Ghosted",date:"2026-03-10",notes:"No response after 21 days"},
  ]);
  const [form,setForm]=useState({company:"",role:"",status:"Applied",date:"",notes:""});
  const [adding,setAdding]=useState(false);
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const add=()=>{
    if(!form.company||!form.role)return;
    setApps(a=>[...a,{...form,id:Date.now()}]);
    setForm({company:"",role:"",status:"Applied",date:"",notes:""});
    setAdding(false);
  };
  const counts=Object.keys(STATUS_COLORS).reduce((acc,s)=>{acc[s]=apps.filter(a=>a.status===s).length;return acc},{});
  return(
    <div style={{animation:"slideIn 0.3s ease"}}>
      <Head label="Application Tracker"/>
      <div style={{display:"flex",gap:2,marginBottom:16}}>
        {Object.entries(counts).map(([s,n])=>(
          <div key={s} style={{flex:1,background:"var(--surface)",border:"1px solid var(--border)",padding:"10px 6px",textAlign:"center",borderTop:`3px solid ${STATUS_COLORS[s]}`}}>
            <div style={{fontFamily:"var(--display)",fontSize:30,color:STATUS_COLORS[s]}}>{n}</div>
            <div style={{fontSize:8,color:"var(--muted)",letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"var(--mono)"}}>{s}</div>
          </div>
        ))}
      </div>
      <button onClick={()=>setAdding(a=>!a)}
        style={{marginBottom:12,fontFamily:"var(--body)",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",
          padding:"8px 18px",background:adding?"var(--surface)":"var(--red)",color:"#fff",
          border:`1px solid ${adding?"var(--border)":"var(--red)"}`,cursor:"pointer"}}>
        {adding?"✕ Cancel":"+ Log Application"}
      </button>
      {adding&&(
        <div style={{background:"var(--surface)",border:"1px solid var(--red)",padding:14,marginBottom:14,
          display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,animation:"slideIn 0.2s ease"}}>
          {["company","role","date","notes"].map(field=>(
            <input key={field} value={form[field]} onChange={f(field)}
              placeholder={field.charAt(0).toUpperCase()+field.slice(1)}
              style={{background:"var(--surface2)",border:"1px solid var(--border)",color:"var(--text)",
                fontSize:10,padding:"7px 10px",outline:"none",fontFamily:"var(--body)"}}/>
          ))}
          <select value={form.status} onChange={f("status")}
            style={{background:"var(--surface2)",border:"1px solid var(--border)",color:"var(--text)",fontSize:10,padding:"7px 10px",fontFamily:"var(--body)"}}>
            {Object.keys(STATUS_COLORS).map(s=><option key={s}>{s}</option>)}
          </select>
          <button onClick={add}
            style={{background:"var(--green)",border:"none",color:"var(--bg)",fontFamily:"var(--body)",
              fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",padding:8,cursor:"pointer"}}>Save →</button>
        </div>
      )}
      <div style={{display:"grid",gap:2}}>
        {apps.map(a=>(
          <div key={a.id} style={{background:"var(--surface)",border:"1px solid var(--border)",borderLeft:`3px solid ${STATUS_COLORS[a.status]}`,padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1}}>
              <div style={{fontFamily:"var(--display)",fontSize:17,color:"var(--text)"}}>{a.role}</div>
              <div style={{fontSize:9,color:"var(--muted)",fontFamily:"var(--mono)"}}>{a.company} · {a.date}</div>
              {a.notes&&<div style={{fontSize:9,color:"var(--muted)",marginTop:3,fontStyle:"italic",fontFamily:"var(--body)"}}>{a.notes}</div>}
            </div>
            <Tag c={STATUS_COLORS[a.status]}>{a.status}</Tag>
            <button onClick={()=>setApps(l=>l.filter(x=>x.id!==a.id))}
              style={{background:"transparent",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:13}}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const getSaved=()=>{try{return localStorage.getItem("lo-theme")||"dark";}catch{return"dark";}};
  const [themeId,setThemeId]=useState(getSaved);
  const [view,setView]=useState("dashboard");
  const [jobs,setJobs]=useState([]);
  const [news,setNews]=useState([]);
  const [jobsLoading,setJobsLoading]=useState(true);
  const [newsLoading,setNewsLoading]=useState(true);
  const [open,setOpen]=useState(true);

  useEffect(()=>{
    applyTheme(THEMES[themeId]);
    try{localStorage.setItem("lo-theme",themeId);}catch{}
  },[themeId]);

  useEffect(()=>{
    fetchJobs().then(d=>{setJobs(d);setJobsLoading(false);});
    fetchNews().then(d=>{setNews(d);setNewsLoading(false);});
  },[]);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",background:"var(--bg)",color:"var(--text)",fontFamily:"var(--body)"}}>
      <Ticker/>
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        {/* Sidebar */}
        <div style={{width:open?190:44,background:"var(--surface)",borderRight:"1px solid var(--border)",transition:"width 0.22s ease",overflow:"hidden",flexShrink:0,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"14px 12px",borderBottom:"1px solid var(--border)",cursor:"pointer",flexShrink:0}} onClick={()=>setOpen(o=>!o)}>
            <span style={{fontFamily:"var(--display)",fontSize:18,letterSpacing:"0.04em",whiteSpace:"nowrap",color:"var(--text)"}}>
              {open?<>LINKED<span style={{color:"var(--red)"}}>OUT</span></>:<span style={{color:"var(--red)"}}>LO</span>}
            </span>
          </div>
          <nav style={{flex:1,paddingTop:6}}>
            {NAV.map(item=>(
              <button key={item.id} onClick={()=>setView(item.id)}
                style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
                  background:view===item.id?"var(--surface2)":"transparent",border:"none",
                  borderLeft:view===item.id?"3px solid var(--red)":"3px solid transparent",
                  color:view===item.id?"var(--text)":"var(--muted)",fontFamily:"var(--body)",
                  fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",cursor:"pointer",
                  textAlign:"left",transition:"all 0.15s",whiteSpace:"nowrap"}}>
                <span style={{fontSize:13,flexShrink:0}}>{item.icon}</span>
                {open&&<span>{item.label}</span>}
                {open&&item.id==="jobs"&&!jobsLoading&&<span style={{marginLeft:"auto",fontSize:7,color:"var(--green)"}}>●</span>}
              </button>
            ))}
          </nav>
          {open&&(
            <div style={{padding:"10px 12px",borderTop:"1px solid var(--border)",fontSize:8,color:"var(--muted)",lineHeight:1.9,letterSpacing:"0.1em",flexShrink:0,fontFamily:"var(--mono)"}}>
              T⁴TECH SOLUTIONS<br/>
              <a href="https://x.com/GeeRadebe" target="_blank" rel="noreferrer" style={{color:"var(--red)",textDecoration:"none"}}>@GeeRadebe</a><br/>
              JHB · 2026
            </div>
          )}
        </div>
        {/* Main */}
        <div style={{flex:1,overflowY:"auto",padding:"24px 24px"}}>
          {view==="dashboard"&&<Dashboard jobs={jobs} news={news}/>}
          {view==="jobs"&&<Jobs jobs={jobs} loading={jobsLoading}/>}
          {view==="news"&&<News news={news} loading={newsLoading}/>}
          {view==="bots"&&<Bots/>}
          {view==="tracker"&&<Tracker/>}
        </div>
      </div>
      <ThemeToggle current={themeId} onChange={setThemeId}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
  </html>
